name: Attach .skill to release

# Builds the installable `tui-design.skill` and uploads it as a release asset.
# Runs automatically when a release is published, and can be run manually
# (workflow_dispatch) to backfill the asset onto an existing tag.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach the .skill to (e.g. v1.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the .skill
        run: ./scripts/package-skill.sh dist

      - name: Determine target tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload asset to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.tag.outputs.tag }}" dist/tui-design.skill --clobber
